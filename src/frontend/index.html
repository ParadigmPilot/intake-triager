<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intake Triager</title>
    <style>
      /* Minimal layout for the teaching artifact; not a design system. */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        max-width: 640px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
        color: #222;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }
      .transcript {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        min-height: 50vh;
      }
      .message {
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        max-width: 85%;
      }
      .message-user {
        background: #e8f0fe;
        align-self: flex-end;
      }
      .message-assistant {
        background: #f1f3f4;
        align-self: flex-start;
      }
      .message-role {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        opacity: 0.55;
        margin-bottom: 0.2rem;
      }
      .message-content {
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      form {
        display: flex;
        gap: 0.5rem;
      }
      input[type='text'] {
        flex: 1;
        padding: 0.55rem 0.7rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      button {
        padding: 0.55rem 1rem;
        font-size: 1rem;
        cursor: pointer;
        border: 1px solid #1a73e8;
        background: #1a73e8;
        color: white;
        border-radius: 6px;
      }
      button:disabled,
      input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .banner {
        padding: 0.55rem 0.75rem;
        border-radius: 6px;
        margin-bottom: 1rem;
        font-size: 0.95rem;
      }
      .banner-error {
        color: #b3261e;
        background: #fce8e6;
      }
      .banner-status {
        color: #5d4037;
        background: #fff3e0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Intake Triager</h1>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
